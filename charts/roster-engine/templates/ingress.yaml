{{- if .Values.ingress.enabled }}
# Standard Ingress for non-PCAI clusters. Everything routes to the frontend;
# its nginx fans out to the backend and MCP internally.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "roster-engine.fullname" . }}
  labels:
    {{- include "roster-engine.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "roster-engine.fullname" . }}-frontend
                port:
                  number: 80
{{- end }}
