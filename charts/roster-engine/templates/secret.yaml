apiVersion: v1
kind: Secret
metadata:
  name: {{ include "roster-engine.fullname" . }}
  labels:
    {{- include "roster-engine.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "auth.secretKey is required (generate with: openssl rand -hex 32)" .Values.auth.secretKey | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  DATABASE_URL: {{ printf "postgresql+psycopg://%s:%s@%s:5432/%s" .Values.postgres.user .Values.postgres.password (include "roster-engine.postgresHost" .) .Values.postgres.database | quote }}
  CELERY_RESULT_BACKEND: {{ printf "db+postgresql+psycopg://%s:%s@%s:5432/%s" .Values.postgres.user .Values.postgres.password (include "roster-engine.postgresHost" .) .Values.postgres.database | quote }}
  {{- if .Values.mcp.enabled }}
  ROSTER_SERVICE_USERNAME: {{ .Values.mcp.serviceUsername | quote }}
  ROSTER_SERVICE_PASSWORD: {{ required "mcp.servicePassword is required when mcp.enabled" .Values.mcp.servicePassword | quote }}
  {{- end }}
